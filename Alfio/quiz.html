<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Epicode - Benchmark Quiz</title>
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <img src="assets/epicode_logo.png" alt="Logo Epicode" />
  </header>
  <!-- MAIN -->
  <main class="quiz">
    <!-- TIMER -->
    <div class="timer">
      <div class="timer-circle">
        <div class="timer-inner">
          <span class="small-text"> SECONDS </span>
          <strong id="countdown"> 60 </strong>
          <span class="small-text"> REMAINING </span>
        </div>
      </div>
    </div>
    <!-- QUESTION -->
    <article class="question">
      <h1 id="questionText">in caricamento..</h1>
    </article>
    <form class="answers">
      <fieldset id="answersGrid"></fieldset>
    </form>
  </main>
  <!-- FOOTER -->
  <footer class="quiz-footer">
    <p>QUESTION <strong id="currentQ">1</strong> <span>/ 10</span></p>
  </footer>
  <script src="questions.js"></script>
  <script src="timer.js"></script>
  <script src="script.js"></script>
</body>

</html>
