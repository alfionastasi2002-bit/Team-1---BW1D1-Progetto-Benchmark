<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/quiz.css" />
  <link rel="stylesheet" href="css/summary.css" />
  <title>Epicode - Benchmark Quiz</title>
</head>

<body>

  <div class="container">

    <header class="site-header">
      <img src="assets/epicode_logo.png" alt="Logo Epicode" />
    </header>

    <main class="quiz">
      <!--Timer circolare -->
      <div class="timer">
        <div class="timer-circle">
          <div class="timer-inner">
            <span class="small-text">SECONDS</span>
            <strong id="countdown">60</strong>
            <span class="small-text">REMAINING</span>
          </div>
        </div>
      </div>
      <!--qui va la domanda inserita con JavaScript-->
      <article class="question">
        <h1 id="questionText">in caricamento..</h1>
      </article>
      <!--Qui JavaScript crea dinamicamente le risposte-->
      <div id="answersGrid"></div>
      <!--qui verrà creato il riepilogo alla fine-->
      <div id="summary-area"></div>
    </main>
    <!-- numero domanda corrente -->
    <footer class="quiz-footer">
      <p>QUESTION <strong id="currentQ">1</strong> <span>/ 10</span></p>
    </footer>
  </div>
  <!-- Libreria esterna per effetto coriandoli-->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script src="js/questions.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/quiz.js"></script>
</body>

</html>
